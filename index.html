<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/site.webmanifest" />
    <meta name="theme-color" content="#050e13" />

    <title>DahmsIO — Where innovation meets intelligence</title>
    <meta name="description" content="DahmsIO is a data, technology and consulting firm that turns complex data and technology into clear, practical systems." />
    <link rel="canonical" href="https://dahms.io/" />

    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="DahmsIO" />
    <meta property="og:title" content="DahmsIO — Where innovation meets intelligence" />
    <meta property="og:description" content="DahmsIO is a data, technology and consulting firm that turns complex data and technology into clear, practical systems." />
    <meta property="og:url" content="https://dahms.io/" />
    <meta property="og:image" content="https://dahms.io/og-image.png" />
    <meta property="og:image:width" content="1200" />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="DahmsIO — Where innovation meets intelligence" />

    <meta name="twitter:image" content="https://dahms.io/og-image.png" />
  </head>
  <body>
    <div id="root"></div>
    <!--
      Static shim so Netlify's build-time crawler can detect this form and its fields.
      The real form is rendered by React on the /contact route; this one is never shown.
      https://docs.netlify.com/manage/forms/setup/#javascript-rendered-forms
    -->
    <form name="contact" data-netlify="true" netlify-honeypot="bot-field" hidden>
      <input type="text" name="companyName" />
      <input type="text" name="website" />
      <input type="text" name="location" />
      <input type="text" name="services" />
      <input type="text" name="budget" />
      <input type="text" name="firstName" />
      <input type="text" name="lastName" />
      <input type="email" name="email" />
      <input type="text" name="subject" />
      <textarea name="message"></textarea>
      <input type="text" name="bot-field" />
    </form>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
